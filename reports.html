    .reports-hero { padding: 56px 0 32px; text-align: center; }

    .reports-hero .sub { color: var(--muted); font-size: 16px; margin: 0 0 24px; }
    .stats-row { display: flex; justify-content: center; gap: 40px; margin: 0 0 28px; flex-wrap: wrap; }
    .stat-item { text-align: center; }
    .stat-item .num { font-size: 36px; font-weight: 800; color: var(--primary); }
    .stat-item .label { font-size: 13px; color: var(--muted); margin-top: 2px; }

    /* Tabs */
    .tab-bar { display: flex; justify-content: center; gap: 0; margin: 0 0 24px; }
    .tab-btn { padding: 10px 32px; font-size: 15px; font-weight: 700; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all .15s; }
    .tab-btn:first-child { border-radius: 10px 0 0 10px; }
    .tab-btn:last-child { border-radius: 0 10px 10px 0; }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .tab-btn:hover:not(.active) { background: var(--soft); }

    /* Search */
    .search-wrap { max-width: 500px; margin: 0 auto 20px; position: relative; }
    .search-input { width: 100%; padding: 13px 16px 13px 44px; font-size: 15px; border: 1.5px solid var(--border); border-radius: 12px; background: var(--surface); color: var(--ink); outline: none; transition: border-color .15s; }
    .search-input:focus { border-color: var(--primary); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 16px; pointer-events: none; }
    .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: 0; color: var(--muted); cursor: pointer; font-size: 18px; display: none; }
    .search-result-count { text-align: center; font-size: 13px; color: var(--muted); margin: -8px 0 16px; min-height: 1em; }

    /* Filters */
    .filter-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin: 0 0 28px; }
    .filter-pill { padding: 6px 16px; font-size: 13px; font-weight: 600; border: 1px solid var(--border); border-radius: 20px; background: var(--surface); color: var(--muted); cursor: pointer; transition: all .12s; }
    .filter-pill:hover { border-color: var(--primary); color: var(--primary); }
    .filter-pill.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .filter-pill .cnt { font-weight: 400; opacity: .7; }

    /* Section headers */
    .section-header { display: flex; align-items: center; gap: 12px; margin: 32px 0 16px; }
    .section-header .s-icon { font-size: 22px; }
    .section-header h2 { font-size: 20px; font-weight: 700; margin: 0; }
    .section-header .s-count { font-size: 13px; color: var(--muted); font-weight: 400; }

    /* Card grid */
    .report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin: 0 0 40px; }
    .report-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: transform .1s, box-shadow .15s; display: block; text-decoration: none; color: var(--ink); position: relative; }
    .report-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.08); border-color: var(--primary); }
    .report-card .rc-tier { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; margin-bottom: 10px; }
    .rc-tier.s { background: #fbe9d0; color: #9a5b00; }
    .rc-tier.aplus { background: #ece3f8; color: #5b3fa0; }
    .rc-tier.a { background: #e2eef6; color: #2b6a8f; }
    .report-card h3 { font-size: 17px; font-weight: 700; margin: 0 0 6px; line-height: 1.3; }
    .report-card .rc-meta { font-size: 13px; color: var(--muted); margin: 0 0 8px; }
    .report-card .rc-highlight { font-size: 13px; color: #4b564f; line-height: 1.5; }
    .report-card .rc-arrow { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 20px; opacity: 0; transition: opacity .15s; }
    .report-card:hover .rc-arrow { opacity: 1; }

    /* 付费预埋 */
    .premium-badge { display: inline; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: #e0894b; color: #fff; margin-left: 8px; vertical-align: middle; }
    /* 上线付费时：移除 display:none */
    .report-card .rc-premium-tag { display: block; position: absolute; top: 12px; right: 12px; font-size: 10px; padding: 3px 8px; border-radius: 4px; background: var(--accent-soft); color: #a0522d; }
    /* 上线付费时：移除 display:none */

    /* 小学占位 */
    .coming-soon { text-align: center; padding: 64px 20px; color: var(--muted); }

    .coming-soon h3 { font-size: 20px; margin: 0 0 8px; color: var(--ink); }
    .coming-soon p { margin: 0 0 20px; }
    .primary-preview { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; text-align: left; max-width: 800px; margin: 24px auto 0; }

    .pp-card .pp-district { font-size: 12px; color: var(--muted); }

    .no-results { text-align: center; padding: 40px; color: var(--muted); }

      .report-grid { grid-template-columns: 1fr; }

    }
  </style>

// 检查报告是否已解锁
function isUnlocked(code) {
  if (localStorage.getItem('all_access') === 'true') return true;
  if (localStorage.getItem('purchased_' + code) === 'true') return true;
  return false;
}

// ========== 小学 Tab 渲染 ==========
let psFilter = 'all';

function renderPs() {
  const search = document.getElementById('searchPs').value.trim().toLowerCase();
  document.getElementById('clearPs').style.display = search ? 'block' : 'none';
  let filtered = PS_REPORTS.filter(r => {
    if (psFilter !== 'all' && r.t !== psFilter) return false;
    if (search) { var q2 = search; var q2tc = toTC(search); var hay = (r.n + ' ' + r.d + ' ' + r.h).toLowerCase(); if (!hay.includes(q2) && q2tc !== q2 && hay.includes(q2tc)) q2 = q2tc; if (!hay.includes(q2)) { const chars = q2.replace(/\\s/g,'').split(''); if (!chars.every(c => hay.includes(c))) return false; } }
    return true;
  });
  const groups = {S:[],'A+':[],A:[],B:[]};
  filtered.forEach(r => groups[r.t] ? groups[r.t].push(r) : null);
  let html = '';
  document.getElementById('resultCountPs').textContent = search ? '「' + document.getElementById('searchPs').value + '」匹配 ' + filtered.length + ' 所' : '';
  for (const [tier, schools] of Object.entries(groups)) {
    if (!schools.length) continue;
    const labels = {S:{icon:'🏆',label:'S 级神校'},'A+':{icon:'🥇',label:'A+ 级一流名校'},A:{icon:'🌟',label:'A 级区内名校'},B:{icon:'💚',label:'B 级优质学校'}};
    const gl = labels[tier];
    html += '<div class="section-header"><span class="s-icon">' + gl.icon + '</span><h2>' + gl.label + '</h2><span class="s-count">' + schools.length + ' 所</span></div><div class="report-grid">';
    schools.forEach(s => {
      const tc = s.t==='S'?'s':s.t==='A+'?'aplus':s.t==='A'?'a':'b';
      html += '<a class="report-card" href="./report-'+s.c+'.html" data-premium="'+s.premium+'"><span class="rc-tier '+tc+'">'+('🏆S级/🥇A+级/🌟A级/💚B级').split('/')[{S:0,'A+':1,A:2,B:3}[s.t]]+'</span>'+(isUnlocked(s.c) ? '<span class="rc-premium-tag" style="background:#d1fae5;color:#059669">✅ 已解锁</span>' : (s.premium ? '<span class="rc-premium-tag">🔒 付费</span>' : '<span class="rc-premium-tag" style="background:#e0e7ff;color:#6366f1">🎉 免费试看</span>'))+'<h3>'+s.n+'</h3><div class="rc-meta">📍 '+s.d+'</div><div class="rc-highlight">'+s.h+'</div><span class="rc-arrow">→</span></a>';
    });
    html += '</div>';
  }
  if (!filtered.length) html = '<div class="no-results">😕 没有匹配的报告，试试其他关键词</div>';
  document.getElementById('psContent').innerHTML = html;
}
