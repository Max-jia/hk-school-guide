<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小學擇校 · 港校指南</title>
  <link rel="stylesheet" href="./assets/style.css" />
<script src="./assets/lang.js"></script>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <div class="brand"><span class="dot"></span><span class="brand-text">港校指南</span></div>
      <div class="nav-links">
        <a href="./index-tc.html">首頁</a>
        <a href="./primary-tc.html">小學擇校</a>
        <a href="./reports-tc.html">深度擇校報告</a>
        <a href="./kindergarten-tc.html">幼稚園擇校</a>
      </div>
    </div>
  </nav>

  <main class="container section">
    <h1 class="section-title">🎒 小學擇校匹配</h1>
    <p class="section-sub">填幾項，幫你從全港小學裏排出「又好又適合你」的。名校會優先浮現，同時尊重你的校網和通勤。</p>

    <div class="wizard">
      <div class="wz-grid">
        <div class="field">
          <label>① 所屬校網 <span class="hint">按住址 · 看括號地區名認領</span></label>
          <select id="net"></select>
        </div>
        <div class="field">
          <label>② 授課語言偏好 <span class="hint">數據完善中</span></label>
          <select id="lang">
            <option>粵語流利</option>
            <option>普通話爲主、粵語較弱</option>
            <option>英文較強</option>
            <option>暫無偏好</option>
          </select>
        </div>
        <div class="field">
          <label>③ 年度學費預算</label>
          <select id="budget">
            <option value="free">僅免費（官立 / 資助）</option>
            <option value="mid">可接受中等學費（直資）</option>
            <option value="high">預算充足（私立 / 國際）</option>
          </select>
        </div>
        <div class="field">
          <label>④ 升學路線規劃</label>
          <select id="track">
            <option value="local">本地路線（升中考 DSE）</option>
            <option value="dss">直資路線</option>
            <option value="international">國際路線</option>
            <option value="any">暫未確定</option>
          </select>
        </div>
        <div class="field">
          <label>⑤ 通勤範圍 <span class="hint">公里 · 距區中心</span></label>
          <input id="commute" type="number" value="5" min="1" max="20" />
        </div>
        <div class="field">
          <label>⑥ 學校性別</label>
          <select id="gender">
            <option value="">不限</option>
            <option value="男女校">男女校</option>
            <option value="男校">男校</option>
            <option value="女校">女校</option>
          </select>
        </div>
        <div class="field">
          <label>⑦ 學校評級 <span class="hint">參考·非官方</span></label>
          <select id="tier">
            <option value="">不限</option>
            <option value="rated">僅已評級名校</option>
            <option value="S">🏆 S 級 · 頂尖神校</option>
            <option value="Aplus">🥇 A+ 級及以上</option>
            <option value="A">🌟 A 級及以上</option>
            <option value="B">✅ B 級及以上</option>
          </select>
        </div>
        <div class="field">
          <label>⑧ 孩子性格 <span class="hint">幫助推薦氛圍更匹配的學校</span></label>
          <select id="personality">
            <option value="balanced">均衡適應 · 各類型都可以</option>
            <option value="active">活潑好動 · 喜歡探索和動手</option>
            <option value="quiet">安靜專注 · 守規矩、適應傳統課堂</option>
            <option value="challenge">喜歡挑戰 · 抗壓能力強、追求卓越</option>
          </select>
        </div>
      </div>
      <div class="wz-actions">
        <button class="btn btn-primary" onclick="run()">🔍 幫我匹配學校</button>
      </div>
    </div>

    <div id="results" class="results"></div>
  </main>

  <footer class="footer">
    <div class="container">數據來源：香港教育局 data.gov.hk · 學校等級爲綜合第三方口碑的<b>參考評級（非官方）</b>，僅對知名學校標註 · 信息僅供參考</div>
  </footer>

  <script src="./data/schools.js"></script>
  <script src="./data/nets.js"></script>
  <script src="./match.js"></script>
  <script>
    // 小學深度報告MAP
    const PS_MAP = {'拔萃女小學':'dgjs','拔萃男書院':'dbs','聖保羅男女中學附屬小學':'spccps','英華小學':'ywps','港大同學會小學':'hkups','香港培正小學':'pcps','瑪利諾修院學校(小學部)':'mcs','喇沙小學':'lsps','聖保祿學校（小學部）':'spcs','協恩中學附屬小學':'hyps','德望小學暨幼稚園':'ghps','天神嘉諾撒學校':'hacs','聖士提反女子中學附屬小學':'ssgps','聖保羅書院小學':'spcps','嘉諾撒聖心學校私立部':'shckps','瑪利曼小學':'mps','嘉諾撒聖瑪利學校':'smcs','嘉諾撒聖心學校':'shck','聖若瑟小學':'sjps','培僑書院':'pkcps','香港華人基督教聯會真道書院':'logos','保良局陳守仁小學':'tsl','播道書院':'evangel','優才(楊殷有娣)書院':'gt','民生書院小學':'munsangps','九龍塘宣道小學':'aps','聖方濟各英文小學':'sfa','浸信會沙田圍呂明才小學':'skhlmc','福建中學附屬學校':'fssas','聖嘉勒小學':'scps','聖士提反書院附屬小學':'sscps','高主教書院小學部':'rcps'};
    function getReportLink(s) {
      if (!s.tier) return '';
      var code = PS_MAP[s.name_zh];
      if (code) return '<a class="btn btn-accent" href="./report-'+code+'.html" target="_blank">\u{1F4C4} 查看完整深度報告 →</a>';
      return '<button class="btn btn-ghost" disabled>\u{1F4C4} 深度報告（僅限評級名小）</button>';
    }
    // 填充校網下拉（帶地區名，方便家長認領）
    const netSel = document.getElementById("net");
    const netNums = [...new Set(SCHOOLS.map(s => s.school_net).filter(n => n && /^\d+$/.test(n)))].sort((a, b) => a - b);
    netNums.forEach(n => {
      const o = document.createElement("option");
      const area = (window.NETS && NETS[n]) ? "（" + NETS[n].slice(0, 16) + "…）" : "";
      o.value = n; o.textContent = n + " 網 " + area; netSel.appendChild(o);
    });

    function run() {
      const net = netSel.value;
      const inNet = SCHOOLS.filter(s => s.school_net === net);
      // 該校網主要屬於哪個區 → 用區中心算距離
      const cnt = {};
      inNet.forEach(s => cnt[s.district_zh] = (cnt[s.district_zh] || 0) + 1);
      const district = Object.keys(cnt).sort((a, b) => cnt[b] - cnt[a])[0] || "";
      const inD = SCHOOLS.filter(s => s.district_zh === district);
      const base = inD.length ? inD : inNet;
      const home = base.length ? {
        lat: base.reduce((a, s) => a + s.lat, 0) / base.length,
        lng: base.reduce((a, s) => a + s.lng, 0) / base.length,
      } : null;
      const profile = {
        net, home, homeLabel: district,
        budget: document.getElementById("budget").value,
        track: document.getElementById("track").value,
        personality: document.getElementById("personality").value,
        maxCommuteKm: +document.getElementById("commute").value,
      };
      let pool = SCHOOLS;
      const g = document.getElementById("gender").value;
      if (g) pool = pool.filter(s => s.gender === g);
      const tv = document.getElementById("tier").value;
      if (tv === "rated") pool = pool.filter(s => s.tier);
      else if (tv === "S") pool = pool.filter(s => s.tier === "S");
      else if (tv === "Aplus") pool = pool.filter(s => ["S", "A+"].includes(s.tier));
      else if (tv === "A") pool = pool.filter(s => ["S", "A+", "A"].includes(s.tier));
      else if (tv === "B") pool = pool.filter(s => ["S", "A+", "A", "B"].includes(s.tier));
      render(Match.rankSchools(pool, profile, 20), net);
    }

    function render(top, net) {
      const box = document.getElementById("results");
      if (!top.length) { box.innerHTML = `<p class="note">沒有完全符合條件的學校，試試放寬篩選（例如放寬評級或性別限制）。</p>`; box.scrollIntoView({ behavior: "smooth" }); return; }
      box.innerHTML = `<h3>爲你匹配的前 ${top.length} 所（校網 ${net}）</h3>
        <p class="section-sub" style="margin-top:-2px">推薦分 = 學校實力(45%) + 與你條件的適配(55%)，好學校+合適→分高；徽章=學校等級（參考·非官方）。</p>` +
        top.map((r, i) => {
          const s = r.school;
          const feeFree = (s.finance_type === "官立" || s.finance_type === "資助");
          const meta = Match.tierMeta(s.tier);
          return `<div class="school-card">
            <span class="score-pill">推薦 ${r.score}</span>
            <div><span class="sc-rank">#${i + 1}</span><span class="sc-name">${s.name_display || s.name_zh}</span></div>
            <div class="tier-row"><span class="tier-badge ${meta.cls}">${meta.label}</span><span class="tier-blurb">${meta.blurb}</span></div>
            <div class="badges">
              <span class="badge ${feeFree ? "free" : ""}">${s.finance_type || "—"}</span>
              <span class="badge">${s.district_zh || ""}</span>
              ${s.school_net && s.school_net !== "不限校網" ? `<span class="badge">${s.school_net}校網</span>` : `<span class="badge">不限校網</span>`}
              ${s.religion_zh && s.religion_zh !== "不適用" ? `<span class="badge">${s.religion_zh}</span>` : ""}
              ${s.fees ? `<span class="badge">💰 ${s.fees}</span>` : ""}
              ${s.through_train ? `<span class="badge free">🔗 ${s.through_train}</span>` : ""}
              ${s.teacher_ratio ? `<span class="badge">師生比 ${s.teacher_ratio}</span>` : ""}
              ${s.teaching_language ? `<span class="badge">🗣️ ${s.teaching_language}</span>` : ""}
              ${s.school_bus ? `<span class="badge">🚌 ${s.school_bus}</span>` : ""}
            </div>
            <ul class="reasons">${r.reasons.map(x => `<li>· ${x}</li>`).join("")}</ul>
            <div class="sc-foot">${getReportLink(s)}</div>
          </div>`;
        }).join("");
      box.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  </script>
</body>
</html>
