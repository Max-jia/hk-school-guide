<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>解锁报告 · 港校指南</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <style>
    .unlock-hero { padding: 80px 20px 40px; text-align: center; max-width: 500px; margin: 0 auto; }
    .unlock-hero h1 { font-family: "Newsreader", serif; font-size: 32px; font-weight: 700; margin: 0 0 12px; }
    .unlock-hero .msg { font-size: 16px; color: #6b7770; margin: 0 0 24px; }
    .unlock-hero a { display: inline-block; margin-top: 16px; padding: 12px 24px; background: #1f6f5c; color: #fff; border-radius: 10px; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
<div class="unlock-hero">
  <div id="status">
    <h1>✅ 支付成功！</h1>
    <p class="msg" id="msg">正在解锁报告…</p>
  </div>
</div>
<script>
(function(){
  var params = new URLSearchParams(location.search);
  var sessionId = params.get('session');
  var token = params.get('token');
  var report = params.get('report');
  var pendingReport = localStorage.getItem('pending_report');

  // 调试信息
  console.log('unlock.html: session='+sessionId+' report='+report+' pending='+pendingReport);
  document.getElementById('msg').textContent =
    'session='+(sessionId||'无')+' report='+(report||'无')+' pending='+(pendingReport||'无');

  // 优先：URL参数中有报告代码
  if (report) {
    unlockAndGo(report);
    return;
  }

  // 其次：从 localStorage 读取「最后访问的报告」
  var pendingReport = localStorage.getItem('pending_report');
  if (pendingReport) {
    localStorage.removeItem('pending_report');
    unlockAndGo(pendingReport);
    return;
  }

  // 再次：URL参数中有 session（Stripe回跳），尝试从session推断
  if (sessionId) {
    // 使用 session ID 前8位生成临时token
    var reportCode = localStorage.getItem('pending_report');
    if (reportCode) {
      localStorage.removeItem('pending_report');
      unlockAndGo(reportCode);
      return;
    }
    // fallback: 跳回首页
    document.getElementById('msg').textContent = '报告已解锁！请重新打开刚才的报告页面。';
    document.getElementById('msg').insertAdjacentHTML('afterend', '<a href="./reports.html">查看全部报告 →</a>');
    return;
  }

  // 兜底
  document.getElementById('msg').innerHTML = '未能自动跳转。<br>请重新打开刚才的报告页面，或从邮件中点击恢复链接。';
  document.getElementById('msg').insertAdjacentHTML('afterend', '<a href="./reports.html">查看全部报告 →</a>');

  function unlockAndGo(code) {
    localStorage.setItem('purchased_' + code, 'true');
    // 确认写入成功
    var check = localStorage.getItem('purchased_' + code);
    document.getElementById('msg').textContent = '已解锁 ' + code + '（验证:' + check + '）· 正在打开…';
    setTimeout(function(){ location.href = './report-' + code + '.html?t=' + Date.now(); }, 1000);
  }
})();
</script>
</body>
</html>
