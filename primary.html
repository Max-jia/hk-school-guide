<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小学择校 · 港校指南</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{ink:"#22302b",muted:"#6b7770",bg:"#fbfaf6",surface:"#ffffff",primary:"#1f6f5c","primary-dark":"#175547",accent:"#a0522d",border:"#e7e3d9",soft:"#f2f0e9"},fontFamily:{sans:["Roboto","PingFang SC","Microsoft YaHei","sans-serif"],serif:["Newsreader","serif"]}}}}</script>
  <link rel="stylesheet" href="./assets/style.css" />
<script src="./assets/lang.js"></script>
</head>
<body>
  <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-border">
    <div class="max-w-6xl mx-auto px-5 flex items-center justify-between h-16">
      <a href="./index.html" class="font-serif text-xl font-bold text-ink tracking-tight flex items-center gap-2 no-underline hover:text-primary transition-colors">
        <span class="w-2.5 h-2.5 rounded-full bg-accent inline-block"></span>港校指南
      </a>
      <div class="flex gap-6 text-[15px] font-semibold">
        <a href="./index.html" class="text-muted hover:text-primary transition-colors">首页</a>
        <a href="./primary.html" class="text-primary border-b-2 border-primary pb-0.5">小学择校</a>
        <a href="./reports.html" class="text-muted hover:text-primary transition-colors">深度报告</a>
        <a href="./kindergarten.html" class="text-muted hover:text-primary transition-colors">幼稚园择校</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-5 py-10">
    <h1 class="font-serif text-3xl font-bold mb-1">小学择校匹配</h1>
    <p class="text-muted mb-6">填几项，帮你从全港小学里排出「又好又适合你」的。名校会优先浮现，同时尊重你的校网和通勤。</p>

    <div class="bg-surface border border-border rounded-2xl p-6 md:p-8 shadow-sm">
      <div class="grid md:grid-cols-2 gap-x-6 gap-y-5">
        <!-- ① 校网 -->
        <div class="flex flex-col gap-1.5">
          <div class="min-h-[2.5em]">
            <label class="text-sm font-bold text-ink">① 所属校网</label>
            <p class="text-xs text-muted leading-tight">按住址 · 看括号地区名认领</p>
          </div>
          <select id="net" class="w-full px-4 py-3 text-[15px] border border-border rounded-xl bg-white text-ink focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition"></select>
        </div>
        <!-- ② -->
        <div class="flex flex-col gap-1.5">
          <div class="min-h-[2.5em]">
            <label class="text-sm font-bold text-ink">② 授课语言偏好</label>
          </div>
          <select id="lang" class="w-full px-4 py-3 text-[15px] border border-border rounded-xl bg-white text-ink focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
            <option>粤语流利</option><option>普通话为主、粤语较弱</option><option>英文较强</option><option>暂无偏好</option>
          </select>
        </div>
        <!-- ③ -->
        <div class="flex flex-col gap-1.5">
          <div class="min-h-[2.5em]">
            <label class="text-sm font-bold text-ink">③ 年度学费预算</label>
          </div>
          <select id="budget" class="w-full px-4 py-3 text-[15px] border border-border rounded-xl bg-white text-ink focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
            <option value="free">仅免费（官立 / 资助）</option><option value="mid">可接受中等学费（直资）</option><option value="high">预算充足（私立 / 国际）</option>
          </select>
        </div>
        <!-- ④ -->
        <div class="flex flex-col gap-1.5">
          <div class="min-h-[2.5em]">
            <label class="text-sm font-bold text-ink">④ 升学路线规划</label>
          </div>
          <select id="track" class="w-full px-4 py-3 text-[15px] border border-border rounded-xl bg-white text-ink focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
            <option value="local">本地路线（升中考 DSE）</option><option value="dss">直资路线</option><option value="international">国际路线</option><option value="any">暂未确定</option>
          </select>
        </div>
        <!-- ⑤ -->
        <div class="flex flex-col gap-1.5">
          <div class="min-h-[2.5em]">
            <label class="text-sm font-bold text-ink">⑤ 通勤范围</label>
            <p class="text-xs text-muted leading-tight">公里 · 距区中心</p>
          </div>
          <input id="commute" type="number" value="5" min="1" max="20" class="w-full px-4 py-3 text-[15px] border border-border rounded-xl bg-white text-ink focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition" />
        </div>
        <!-- ⑥ -->
        <div class="flex flex-col gap-1.5">
          <div class="min-h-[2.5em]">
            <label class="text-sm font-bold text-ink">⑥ 学校性别</label>
          </div>
          <select id="gender" class="w-full px-4 py-3 text-[15px] border border-border rounded-xl bg-white text-ink focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
            <option value="">不限</option><option value="男女校">男女校</option><option value="男校">男校</option><option value="女校">女校</option>
          </select>
        </div>
        <!-- ⑦ -->
        <div class="flex flex-col gap-1.5">
          <div class="min-h-[2.5em]">
            <label class="text-sm font-bold text-ink">⑦ 学校评级</label>
            <p class="text-xs text-muted leading-tight">参考 · 非官方</p>
          </div>
          <select id="tier" class="w-full px-4 py-3 text-[15px] border border-border rounded-xl bg-white text-ink focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
            <option value="">不限</option><option value="rated">仅已评级名校</option><option value="S">S 级 · 顶尖神校</option><option value="Aplus">A+ 级及以上</option><option value="A">A 级及以上</option><option value="B">✅ B 级及以上</option>
          </select>
        </div>
        <!-- ⑧ -->
        <div class="flex flex-col gap-1.5">
          <div class="min-h-[2.5em]">
            <label class="text-sm font-bold text-ink">⑧ 孩子性格</label>
            <p class="text-xs text-muted leading-tight">帮助我们推荐氛围更匹配的学校</p>
          </div>
          <select id="personality" class="w-full px-4 py-3 text-[15px] border border-border rounded-xl bg-white text-ink focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition">
            <option value="balanced">均衡适应 · 各类型都可以</option>
            <option value="active">活泼好动 · 喜欢探索和动手</option>
            <option value="quiet">安静专注 · 守规矩、适应传统课堂</option>
            <option value="challenge">喜欢挑战 · 抗压能力强、追求卓越</option>
          </select>
        </div>
      </div>
      <div class="mt-6">
        <button class="inline-flex items-center px-8 py-4 bg-primary text-white font-bold rounded-xl hover:bg-primary-dark transition-colors shadow-sm text-base" onclick="run()">帮我匹配学校</button>
      </div>
    </div>

    <div id="results" class="results mt-8"></div>
  </main>

  <footer class="border-t border-border mt-12 py-7">
    <div class="max-w-6xl mx-auto px-5 text-sm text-muted leading-relaxed">数据来源：香港教育局 data.gov.hk · 学校等级为综合第三方口碑的<b>参考评级（非官方）</b>，仅对知名学校标注 · 信息仅供参考</div>
  </footer>

  <script src="./data/schools.js"></script>
  <script src="./data/nets.js"></script>
  <script src="./match.js"></script>
  <script>
    // 小学深度报告MAP
    const PS_MAP = {'拔萃女小學':'dgjs','拔萃男書院':'dbs','聖保羅男女中學附屬小學':'spccps','英華小學':'ywps','港大同學會小學':'hkups','香港培正小學':'pcps','瑪利諾修院學校(小學部)':'mcs','喇沙小學':'lsps','聖保祿學校（小學部）':'spcs','協恩中學附屬小學':'hyps','德望小學暨幼稚園':'ghps','天神嘉諾撒學校':'hacs','聖士提反女子中學附屬小學':'ssgps','聖保羅書院小學':'spcps','嘉諾撒聖心學校私立部':'shckps','瑪利曼小學':'mps','嘉諾撒聖瑪利學校':'smcs','嘉諾撒聖心學校':'shck','聖若瑟小學':'sjps','培僑書院':'pkcps','香港華人基督教聯會真道書院':'logos','保良局陳守仁小學':'tsl','播道書院':'evangel','優才(楊殷有娣)書院':'gt','民生書院小學':'munsangps','九龍塘宣道小學':'aps','聖方濟各英文小學':'sfa','浸信會沙田圍呂明才小學':'skhlmc','福建中學附屬學校':'fssas','聖嘉勒小學':'scps','聖士提反書院附屬小學':'sscps','高主教書院小學部':'rcps','aogps':'aogps','brgps':'brgps','hfc':'hfc','hfcklt':'hfcklt','hrgp':'hrgp','hrgps':'hrgps','icqm':'icqm','kcps':'kcps','ktgps':'ktgps','ktl':'ktl','la':'la','lht':'lht','lmc':'lmc','mtc':'mtc','mtcps':'mtcps','plkcastar':'plkcastar','plklht':'plklht','py2':'py2','skhcf':'skhcf','skhhs':'skhhs','skhke':'skhke','skhsm':'skhsm','skhyl':'skhyl','skhyl2':'skhyl2','sppcs':'sppcs','sppcs2':'sppcs2','tlps':'tlps','wyps':'wyps','ylaps':'ylaps'};
    function getReportLink(s) {
      if (!s.tier) return '';
      var code = PS_MAP[s.name_zh];
      if (code) return '<a class="btn btn-accent" href="./report-'+code+'.html" target="_blank">\u{1F4C4} 查看完整深度报告 →</a>';
      return '<button class="btn btn-ghost" disabled>\u{1F4C4} 深度报告（仅限评级名小）</button>';
    }
    // 填充校网下拉（带地区名，方便家长认领）
    const netSel = document.getElementById("net");
    const netNums = [...new Set(SCHOOLS.map(s => s.school_net).filter(n => n && /^\d+$/.test(n)))].sort((a, b) => a - b);
    netNums.forEach(n => {
      const o = document.createElement("option");
      const area = (window.NETS && NETS[n]) ? "（" + NETS[n].slice(0, 16) + "…）" : "";
      o.value = n; o.textContent = n + " 网 " + area; netSel.appendChild(o);
    });

    function run() {
      const net = netSel.value;
      const inNet = SCHOOLS.filter(s => s.school_net === net);
      // 该校网主要属于哪个区 → 用区中心算距离
      const cnt = {};
      inNet.forEach(s => cnt[s.district_zh] = (cnt[s.district_zh] || 0) + 1);
      const district = Object.keys(cnt).sort((a, b) => cnt[b] - cnt[a])[0] || "";
      const inD = SCHOOLS.filter(s => s.district_zh === district);
      const base = inD.length ? inD : inNet;
      const home = base.length ? {
        lat: base.reduce((a, s) => a + s.lat, 0) / base.length,
        lng: base.reduce((a, s) => a + s.lng, 0) / base.length,
      } : null;
      const profile = {
        net, home, homeLabel: district,
        budget: document.getElementById("budget").value,
        track: document.getElementById("track").value,
        personality: document.getElementById("personality").value,
        maxCommuteKm: +document.getElementById("commute").value,
      };
      let pool = SCHOOLS;
      const g = document.getElementById("gender").value;
      if (g) pool = pool.filter(s => s.gender === g);
      const tv = document.getElementById("tier").value;
      if (tv === "rated") pool = pool.filter(s => s.tier);
      else if (tv === "S") pool = pool.filter(s => s.tier === "S");
      else if (tv === "Aplus") pool = pool.filter(s => ["S", "A+"].includes(s.tier));
      else if (tv === "A") pool = pool.filter(s => ["S", "A+", "A"].includes(s.tier));
      else if (tv === "B") pool = pool.filter(s => ["S", "A+", "A", "B"].includes(s.tier));
      render(Match.rankSchools(pool, profile, 20), net);
    }

    function render(top, net) {
      const box = document.getElementById("results");
      if (!top.length) { box.innerHTML = `<p class="note">没有完全符合条件的学校，试试放宽筛选（例如放宽评级或性别限制）。</p>`; box.scrollIntoView({ behavior: "smooth" }); return; }
      box.innerHTML = `<h3>为你匹配的前 ${top.length} 所（校网 ${net}）</h3>
        <p class="section-sub" style="margin-top:-2px">推荐分 = 学校实力(45%) + 与你条件的适配(55%)，好学校+合适→分高；徽章=学校等级（参考·非官方）。</p>` +
        top.map((r, i) => {
          const s = r.school;
          const feeFree = (s.finance_type === "官立" || s.finance_type === "资助");
          const meta = Match.tierMeta(s.tier);
          const sess = (s.sessions && s.sessions.length) ? `<span class="badge">${s.sessions.join("/")}</span>` : "";
          return `<div class="school-card">
            <span class="score-pill">推荐 ${r.score}</span>
            <div><span class="sc-rank">#${i + 1}</span><span class="sc-name">${s.name_display || s.name_zh}</span></div>
            <div class="tier-row"><span class="tier-badge ${meta.cls}">${meta.label}</span><span class="tier-blurb">${meta.blurb}</span></div>
            <div class="badges">
              <span class="badge ${feeFree ? "free" : ""}">${s.finance_type || "—"}</span>
              <span class="badge">${s.district_zh || ""}</span>
              ${s.school_net && s.school_net !== "不限校网" ? `<span class="badge">${s.school_net}校网</span>` : `<span class="badge">不限校网</span>`}
              ${s.religion_zh && s.religion_zh !== "不适用" ? `<span class="badge">${s.religion_zh}</span>` : ""}
              ${s.fees ? `<span class="badge">💰 ${s.fees}</span>` : ""}
              ${s.through_train ? `<span class="badge free">🔗 ${s.through_train}</span>` : ""}
              ${s.teacher_ratio ? `<span class="badge">师生比 ${s.teacher_ratio}</span>` : ""}
              ${s.teaching_language ? `<span class="badge">🗣️ ${s.teaching_language}</span>` : ""}
              ${s.school_bus ? `<span class="badge">🚌 ${s.school_bus}</span>` : ""}
              ${sess}
            </div>
            <ul class="reasons">${r.reasons.map(x => `<li>· ${x}</li>`).join("")}</ul>
            <div class="sc-foot">${getReportLink(s)}</div>
          </div>`;
        }).join("");
      box.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  </script>
</body>
</html>
