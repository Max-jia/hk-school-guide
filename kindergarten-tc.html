<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幼稚園 / PN 擇校 · 港校指南</title>
  <link rel="stylesheet" href="./assets/style.css" />
<script src="./assets/lang.js"></script>
</head>
<body>
  <nav class="nav">
    <div class="container nav-inner">
      <div class="brand"><span class="dot"></span><span class="brand-text">港校指南</span></div>
      <div class="nav-links">
        <a href="./index-tc.html">首頁</a>
        <a href="./primary-tc.html">小學擇校</a>
        <a href="./reports-tc.html">深度擇校報告</a>
        <a href="./kindergarten-tc.html">幼稚園擇校</a>
      </div>
    </div>
  </nav>

  <main class="container section">
    <h1 class="section-title">🎨 幼稚園 / PN 擇校匹配</h1>
    <p class="section-sub">幼稚園不按校網派位，就近+實力最重要。按你家的條件從全港幼稚園中智能匹配。</p>

    <div class="wizard">
      <div class="wz-grid">
        <div class="field">
          <label>① 家庭住址（所在地區）</label>
          <select id="district"></select>
        </div>
        <div class="field">
          <label>② 通勤範圍 <span class="hint">公里 · 距區中心</span></label>
          <input id="commute" type="number" value="3" min="1" max="15" />
        </div>
        <div class="field">
          <label>③ 年度學費預算（上限）</label>
          <select id="budget">
            <option value="">不限</option>
            <option value="0:1">免費 / 半日免費</option>
            <option value="0:5000">$5,000 以內</option>
            <option value="0:20000">$20,000 以內</option>
            <option value="0:50000">$50,000 以內</option>
            <option value="0:80000">$80,000 以內</option>
            <option value="0:120000">$120,000 以內</option>
            <option value="0:200000">$200,000 以內</option>
          </select>
        </div>
        <div class="field">
          <label>④ 學校類型偏好</label>
          <select id="ktype">
            <option value="">不限</option>
            <option value="券校">券校（免費計劃）</option>
            <option value="私立">私立</option>
            <option value="國際">國際</option>
          </select>
        </div>
        <div class="field">
          <label>⑤ 授課語言偏好</label>
          <select id="lang">
            <option value="">不限</option>
            <option value="普通話">重視普通話</option>
            <option value="英語">重視英語</option>
            <option value="粵語">粵語即可</option>
          </select>
        </div>
        <div class="field">
          <label>⑥ 直升小學 <span class="hint">已覆蓋主要龍幼</span></label>
          <select id="feeder">
            <option value="">不限</option>
            <option value="yes">優先有直屬/聯繫小學</option>
          </select>
        </div>
        <div class="field">
          <label>⑦ 上課時段 <span class="hint">篩選</span></label>
          <select id="session">
            <option value="any">不限</option>
            <option value="上午">上午班</option>
            <option value="下午">下午班</option>
            <option value="全日">全日班</option>
          </select>
        </div>
        <div class="field">
          <label>⑧ PN 班 <span class="hint">篩選 · 2歲幼兒班</span></label>
          <select id="pn">
            <option value="any">不限</option>
            <option value="yes">須設有 PN 班</option>
          </select>
        </div>
        <div class="field">
          <label>⑨ 幼稚園評級 <span class="hint">篩選</span></label>
          <select id="tier">
            <option value="">不限</option>
            <option value="rated">僅已評級名園</option>
            <option value="S">🏆 S 級</option>
            <option value="Aplus">🥇 A+ 及以上</option>
            <option value="A">🌟 A 及以上</option>
          </select>
        </div>
      </div>
      <div class="wz-actions">
        <button class="btn btn-primary" onclick="run()">🔍 幫我匹配幼稚園</button>
      </div>
    </div>

    <p class="note info" style="margin-top:16px">學費爲官方概覽或已覈實數據（約數·參考）；名園等級爲多源共識評級（參考·非官方）；PN 數據來自教育局「提供2-3歲幼兒服務」；授課語言僅名園已逐所覈實、其餘僅供參考。報名前請向心儀學校官網確認最新信息。</p>

    <div id="results" class="results"></div>
  </main>

  <footer class="footer">
    <div class="container">數據來源：香港教育局 data.gov.hk · 園所等級爲多源共識<b>參考評級（非官方）</b> · PN 依官方「提供2-3歲服務」· 信息僅供參考</div>
  </footer>

  <script src="./data/kindergartens.js"></script>
  <script src="./match.js"></script>
  <script>
    // 填充地區下拉
    const dSel = document.getElementById("district");
    const districts = [...new Set(KINDERGARTENS.map(k => k.district_zh).filter(Boolean))].sort();
    districts.forEach(d => { const o = document.createElement("option"); o.value = d; o.textContent = d; dSel.appendChild(o); });

    function run() {
      const district = dSel.value;
      const inDistrict = KINDERGARTENS.filter(k => k.district_zh === district);
      const home = inDistrict.length ? {
        lat: inDistrict.reduce((a, k) => a + k.lat, 0) / inDistrict.length,
        lng: inDistrict.reduce((a, k) => a + k.lng, 0) / inDistrict.length,
      } : null;
      // 硬篩選：時段 / PN / 評級
      let pool = KINDERGARTENS;
      const sp = document.getElementById("session").value;
      if (sp && sp !== "any") pool = pool.filter(k => (k.sessions || []).includes(sp));
      if (document.getElementById("pn").value === "yes") pool = pool.filter(k => k.has_pn);
      const tv = document.getElementById("tier").value;
      if (tv === "rated") pool = pool.filter(k => k.tier);
      else if (tv === "S") pool = pool.filter(k => k.tier === "S");
      else if (tv === "Aplus") pool = pool.filter(k => ["S", "A+"].includes(k.tier));
      else if (tv === "A") pool = pool.filter(k => ["S", "A+", "A"].includes(k.tier));
      // 評分參數（直升/預算/通勤/類型/語言）
      const bv = document.getElementById("budget").value;
      const profile = {
        home, homeLabel: district,
        maxCommuteKm: +document.getElementById("commute").value,
        budgetMax: bv ? Number(bv.split(":")[1]) : null,
        typePref: document.getElementById("ktype").value || null,
        langPref: document.getElementById("lang").value || null,
        wantFeeder: document.getElementById("feeder").value === "yes",
      };
      render(Match.rankKindergartens(pool, profile, 20), district);
    }

    function render(top, district) {
      const box = document.getElementById("results");
      if (!top.length) { box.innerHTML = `<p class="note">沒有符合條件的幼稚園，試試放寬篩選（如放寬時段/評級或學費上限）。</p>`; box.scrollIntoView({ behavior: "smooth" }); return; }
      box.innerHTML = `<h3>爲你匹配的前 ${top.length} 所（${district}）</h3>
        <p class="section-sub" style="margin-top:-2px">推薦分 = 園所實力(60%：等級+師生比) + 與你條件適配(40%：直升/預算/通勤/類型/語言)；徽章=園所口碑（參考·非官方）。</p>` +
        top.map((r, i) => {
          const s = r.school;
          const meta = Match.tierMeta(s.tier);
          return `<div class="school-card">
            <span class="score-pill">推薦 ${r.score}</span>
            <div><span class="sc-rank">#${i + 1}</span><span class="sc-name">${s.name_display || s.name_zh}</span></div>
            <div class="tier-row"><span class="tier-badge ${meta.cls}">${meta.label}</span><span class="tier-blurb">${meta.blurb}</span></div>
            <div class="badges">
              <span class="badge">${s.district_zh || ""}</span>
              ${s.note ? `<span class="badge" style="background:#fbe4e4;color:#a33">${s.note}</span>` : ""}
              ${s.has_pn ? `<span class="badge free">🍼 設有 PN 班</span>` : ""}
              ${s.kg_type ? `<span class="badge">${s.kg_type}</span>` : ""}
              ${s.fees ? `<span class="badge">💰 ${s.fees}</span>` : ""}
              ${s.teaching_language ? `<span class="badge">🗣️ ${s.teaching_language}</span>` : ""}
              ${s.feeder_primary ? `<span class="badge free">🎓 直升 ${s.feeder_primary}</span>` : ""}
              ${s.teacher_ratio ? `<span class="badge">師生比 ${s.teacher_ratio}</span>` : ""}
              ${(s.sessions && s.sessions.length) ? `<span class="badge">${s.sessions.join("/")}</span>` : ""}
            </div>
            <ul class="reasons">${r.reasons.map(x => `<li>· ${x}</li>`).join("")}</ul>
            <div class="sc-foot">${s.tier
            ? (() => {
                const MAP = {寶山幼兒園:'braemar-hill',香港創價幼稚園:'soka',基督堂幼稚園:'cckg',國際英文幼稚園:'stcat',
                  民生書院幼稚園:'munsang',根德園幼稚園:'kentville',聖保祿幼稚園:'spk',劍鳴幼稚園:'keenmind',
                  宣道幼稚園:'alliance',協恩中學附屬幼稚園:'hy',蘇浙小學校:'kiangsu',嘉諾撒聖心幼稚園:'shck',
                  香港靈糧堂幼稚園:'llc','天主教聖瑪加利大幼稚園':'smm','香港培正小學':'pc',救恩學校:'ky',
                  綠楊幼稚園:'ly',寶血幼稚園:'pb',高主教書院幼稚園部:'rc',聖公會幼稚園:'skh',聖保羅堂幼稚園:'spc',
                  金巴倫英文幼稚園:'snicholas',聖羅撒幼稚園:'srl',崇真小學暨幼稚園:'tt',約克國際幼稚園:'york',
                  香港培道小學:'pt','聖士提反女子中學附屬幼稚園':'ssgc','聖母無玷聖心幼稚園':'ihm',九龍禮賢學校:'krs',基督教中心幼稚園:'ccc',
                  '銅鑼灣維多利亞國際幼稚園':'veo-cwb','維多利亞(何文田)國際幼稚園':'veo-hmt','維多利亞(寶翠園)幼稚園':'veo-bcy',
                  '學之園幼稚園(海翩康城)':'lh-hp','學之園幼稚園（凱帆薈）':'lh-sf',
                  '迦南幼稚園(九龍塘)':'canaan-klt','迦南幼稚園(中環堅道)':'canaan-cd',
                  '啓思小學附屬幼稚園':'cpskg','耀中國際幼稚園（根德道）':'ycis-kt',
                  '多多國際幼稚園（九龍塘）':'tutor-klt','約克英文小學暨幼稚園(九龍塘)':'york-klt'};
                const BRAND_MAP = {'維多利亞':'victoria','學之園':'lh','耀中':'ycis','迦南':'canaan','啓思':'creative','康傑':'goodhealth','明慧':'mingwai','朗思':'think','多多':'tutor','約克':'york'}; // 連鎖品牌：所有分校共用同一份報告
                let code = MAP[s.name_zh];
                if (!code) { for (const [k,v] of Object.entries(BRAND_MAP)) { if (s.name_zh.includes(k)) { code = v; break; } } }
                return code
                  ? '<a class="btn btn-accent" href="./report-'+code+'.html" target="_blank">📄 查看完整深度報告 →</a>'
                  : '<button class="btn btn-ghost" disabled>📄 深度報告（僅限26所名園）</button>';
              })()
            : ''
          }</div>
          </div>`;
        }).join("");
      box.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  </script>
</body>
</html>
